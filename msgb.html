<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <style>
        body { 
            margin: 0; padding: 0; 
            overflow: hidden; 
            background-color: transparent; 
            font-family: 'Segoe UI', Arial, sans-serif;
            width: 100vw;
        }
        
        .wrapper {
            margin-top: 60px; 
            position: relative;
            width: 100%;
            height: 140px; 
            display: flex;
            align-items: center;
        }

        /* The Main Pink Bar */
        .scroll-container {
            display: flex;
            align-items: center;
            height: 50px;
            width: 90%;
            margin: 0 auto;
            background: #ffdae9; 
            border-top: 6px dashed #ef4a81;
            border-bottom: 6px dashed #ef4a81;
            position: relative;
            z-index: 10;
        }

        /* Left Side Badge with QR Code */
        .left-badge {
            position: absolute;
            left: 2%;
            width: 110px;
            height: 110px;
            background: radial-gradient(circle, #ffdae9 60%, #ef4a81 100%);
            border: 4px solid #fff;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .qr-wrapper {
            width: 75px;
            height: 75px;
            background: white;
            padding: 5px;
            border-radius: 8px;
        }
        .qr-wrapper img { width: 100%; height: 100%; }

        /* Right Side Mascot Badge */
        .emoji-area {
            position: absolute;
            right: 2%;
            width: 105px;
            height: 105px;
            background: #ef4a81;
            border: 4px solid #fff;
            border-radius: 50%;
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
        .emoji-gif { width: 75%; height: 75%; object-fit: contain; }

        /* Seamless Ticker Logic */
        .scroll-wrapper {
            width: 100%;
            overflow: hidden;
            display: flex;
            margin: 0 120px; 
        }

        .scroll-content {
            display: flex;
            align-items: center;
            white-space: nowrap;
            animation: scroll-rtl 20s linear infinite; 
        }

        @keyframes scroll-rtl {
            0% { transform: translateX(0); }
            100% { transform: translateX(100%); }
        }

        .item { display: flex; align-items: center; padding-left: 100px; }
        .text { font-size: 28px; color: #ef4a81; font-weight: bold; } 
        .username { color: #8e24aa; font-weight: 900; font-size: 28px; margin-left: 10px; }
        
        .scroll-logo { height: 40px; margin: 0 20px; }

        /* CSS PURE CANDY DECORATIONS (No External Images Needed) */
        .css-candy {
            position: absolute;
            z-index: 110;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            background: repeating-conic-gradient(#fff 0deg 30deg, #ef4a81 30deg 60deg);
            border: 3px solid #fff;
            box-shadow: 2px 2px 5px rgba(0,0,0,0.2);
        }

        .css-candy::after { /* The Stick */
            content: '';
            position: absolute;
            bottom: -25px;
            left: 50%;
            width: 6px;
            height: 30px;
            background: #eee;
            transform: translateX(-50%);
            z-index: -1;
            border-radius: 3px;
        }

        .pop-left { left: 10%; bottom: -10px; transform: rotate(-15deg); }
        .pop-mid { left: 50%; bottom: -25px; transform: translateX(-50%) scale(0.8); }
        .pop-right { right: 12%; top: -15px; transform: rotate(15deg); }

    </style>
</head>
<body>

<div class="wrapper">
    <div class="left-badge">
        <div class="qr-wrapper">
             <img src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=https://spacetoonold.netlify.app/message">
        </div>
    </div>

    <div class="scroll-container">
        <div class="css-candy pop-mid"></div>
        
        <div class="scroll-wrapper">
            <div class="scroll-content" id="content">
                <div class="item">
                    <span class="text">أرسل رسالتك الآن لتظهر على الشاشة</span>
                    <img class="scroll-logo" src="https://raw.githubusercontent.com/Mastergive/randompngtosave/refs/heads/main/Stoon2013.png">
                </div>
            </div>
            <div class="scroll-content" id="copy"></div>
        </div>
    </div>

    <div class="emoji-area">
        <img id="emojiImg" class="emoji-gif" src="https://raw.githubusercontent.com/Mastergive/randompngtosave/refs/heads/main/gif1.gif">
    </div>

    <div class="css-candy pop-left"></div>
    <div class="css-candy pop-right" style="background: repeating-conic-gradient(#fff 0deg 30deg, #ff9800 30deg 60deg);"></div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
<script>
    const content = document.getElementById('content');
    const copy = document.getElementById('copy');
    copy.innerHTML = content.innerHTML;

    const emojiList = [
        "https://raw.githubusercontent.com/Mastergive/randompngtosave/refs/heads/main/gif1.gif", 
        "https://raw.githubusercontent.com/Mastergive/randompngtosave/refs/heads/main/gif2.gif",
        "https://raw.githubusercontent.com/Mastergive/randompngtosave/refs/heads/main/gif3.gif",
        "https://raw.githubusercontent.com/Mastergive/randompngtosave/refs/heads/main/gif4.gif",
        "https://raw.githubusercontent.com/Mastergive/randompngtosave/refs/heads/main/gif5.gif"
    ];
    let eIdx = 0;
    setInterval(() => {
        eIdx = (eIdx + 1) % emojiList.length;
        document.getElementById('emojiImg').src = emojiList[eIdx];
    }, 5000);

    const firebaseConfig = {
        apiKey: "AIzaSyAtO7mz0ZptyJKCBo1ouV420ej5bWC5VYY",
        databaseURL: "https://spacetoonold-aaac4-default-rtdb.firebaseio.com", 
        projectId: "spacetoonold-aaac4",
        appId: "1:511855750136:web:d353fa9309ac5e54a9040d"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    function addNewMessage(user, messageText) {
        const newItem = document.createElement('div');
        newItem.className = 'item';
        newItem.innerHTML = `
            <span class="username">${user}:</span>
            <span class="text">${messageText}</span>
            <img class="scroll-logo" src="https://raw.githubusercontent.com/Mastergive/randompngtosave/refs/heads/main/Stoon2013.png">
        `;
        content.appendChild(newItem);
        copy.innerHTML = content.innerHTML; 
    }

    db.ref('latestMessage').on('value', (snapshot) => {
        const data = snapshot.val();
        if (data && data.text) {
            addNewMessage(data.username, data.text);
        }
    });
</script>

</body>
</html>
